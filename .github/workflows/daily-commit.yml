name: Daily Auto Commit

on:
  schedule:
    - cron: '17 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "24f2004190@ds.study.iitm.ac.in"

      - name: 24f2004190@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily commit"
          git push
